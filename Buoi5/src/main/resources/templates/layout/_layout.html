<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE | Product Manager">
        Product Manager
    </title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            background-color: #f5f6fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Header ===== */
        header {
            background: #e084ef;
            padding: 15px 30px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== Main ===== */
        main {
            flex: 1;
            padding: 30px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .content-box {
            background: white;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* ===== Footer ===== */
        footer {
            background: #e084ef;
            color: #bdc3c7;
            text-align: center;
            padding: 12px;
            font-size: 14px;
        }

        /* ===== Error ===== */
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <a th:href="@{/products}">🏠 Trang chủ</a>
            <a th:href="@{/products/create}">➕ Thêm sản phẩm</a>
            <a th:href="@{/categories/create}">📁 Thêm danh mục</a>
        </nav>
    </header>

    <main>
        <div class="content-box" layout:fragment="content">
            <!-- Nội dung trang con -->
        </div>
    </main>

    <footer>
        © 2026 - Product Manager
    </footer>

</body>

</html>
