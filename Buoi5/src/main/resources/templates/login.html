<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #3730a3 0%, #4f46e5 60%, #06b6d4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e1b4b;
        }

        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .2);
            width: 100%;
            max-width: 420px;
            margin: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #3730a3;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: .88rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            transition: all .2s;
        }

        .form-group input:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            font-size: .88rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .alert-error {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #6ee7b7;
        }

        .alert-info {
            background: #e0e7ff;
            color: #4338ca;
            border: 1px solid #a5b4fc;
        }

        .btn-submit {
            width: 100%;
            background: #4f46e5;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #3730a3;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: .88rem;
        }

        .auth-links a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>🔐 Đăng nhập hệ thống</h2>

        <!-- Flash messages or Auth errors -->
        <div th:if="${param.error}" class="alert alert-error">
            Sai tên đăng nhập hoặc mật khẩu!
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Bạn đã đăng xuất thành công.
        </div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">
            <!-- From flash attributes after register -->
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập tên đăng nhập..." required autofocus>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>

        <div class="auth-links">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</body>

</html>
