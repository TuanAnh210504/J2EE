<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e1b4b;
        }

        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, .1);
            width: 100%;
            max-width: 420px;
            margin: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #3730a3;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: .88rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            transition: all .2s;
        }

        .form-group input:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
        }

        .error {
            color: #ef4444;
            font-size: .8rem;
            margin-top: 4px;
            display: block;
        }

        .global-error {
            background: #fee2e2;
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            font-size: .85rem;
            margin-bottom: 20px;
        }

        .btn-submit {
            width: 100%;
            background: #4f46e5;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #3730a3;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: .88rem;
        }

        .auth-links a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>tạo tài khoản mới</h2>

        <div th:if="${errorMessage}" class="global-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${registerDto}" method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" th:field="*{username}" placeholder="Nhập tên đăng nhập...">
                <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="text" th:field="*{email}" placeholder="Nhập địa chỉ email...">
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" th:field="*{password}" placeholder="Bao gồm số, chữ thường, chữ hoa...">
                <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn-submit">Đăng Ký</button>
        </form>

        <div class="auth-links">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
        </div>
    </div>
</body>

</html>
