<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/_layout}">

<head>
    <title th:text="${category.id == 0 ? 'Thêm danh mục' : 'Cập nhật danh mục'}"></title>
</head>

<body>
    <section layout:fragment="content">

        <h2 th:text="${category.id == 0 ? '➕ Thêm danh mục' : '✏️ Cập nhật danh mục'}"></h2>

        <form th:action="${category.id == 0}
                     ? @{/categories/create}
                     : @{/categories/edit/{id}(id=${category.id})}" th:object="${category}" method="post"
            style="max-width: 480px;">

            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Tên danh mục</label>
                <input type="text" th:field="*{name}" placeholder="Nhập tên danh mục...">
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Lưu danh mục</button>
                <a class="btn btn-secondary" th:href="@{/products}">⬅ Quay lại</a>
            </div>

        </form>
    </section>
</body>

</html>
