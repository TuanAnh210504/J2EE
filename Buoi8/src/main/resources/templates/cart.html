<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/_layout}">

<head>
    <title>Giỏ hàng</title>
</head>

<section layout:fragment="content">

    <h2>🛒 Giỏ hàng của bạn</h2>

    <!-- Giỏ trống -->
    <div th:if="${#lists.isEmpty(cartItems)}"
         style="text-align:center; padding:60px 0; color:#9ca3af;">
        <p style="font-size:3rem; margin-bottom:12px;">🛍</p>
        <p style="font-size:1.1rem;">Giỏ hàng đang trống.</p>
        <a th:href="@{/products}" class="btn btn-primary" style="margin-top:16px;">🔙 Tiếp tục mua sắm</a>
    </div>

    <!-- Danh sách sản phẩm trong giỏ -->
    <div th:if="${!#lists.isEmpty(cartItems)}">
        <table>
            <thead>
                <tr>
                    <th>Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td>
                        <img class="product-img" th:if="${item.productImage != null}" th:src="${item.productImage}" alt="" />
                        <div class="img-placeholder" th:if="${item.productImage == null}">🖼</div>
                    </td>
                    <td>
                        <span style="font-weight:600;" th:text="${item.productName}"></span>
                    </td>
                    <td>
                        <span class="price-badge"
                              th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </td>
                    <td>
                        <!-- Cập nhật số lượng -->
                        <form th:action="@{/cart/update}" method="post" style="display:flex; gap:6px; align-items:center;">
                            <input type="hidden" name="productId" th:value="${item.productId}" />
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                   style="width:65px; padding:6px 8px; border:1.5px solid #e5e7eb; border-radius:6px; font-size:.88rem;" />
                            <button type="submit" class="btn btn-secondary" style="padding:6px 10px; font-size:.8rem;">✔</button>
                        </form>
                    </td>
                    <td>
                        <span class="price-badge" style="background:#dcfce7; color:#16a34a;"
                              th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-danger"
                           onclick="return confirm('Xóa sản phẩm này khỏi giỏ?')">🗑 Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Tổng tiền + Checkout -->
        <div style="display:flex; justify-content:flex-end; align-items:center; gap:20px; margin-top:24px; padding-top:20px; border-top:2px solid #e5e7eb;">
            <span style="font-size:1.1rem; font-weight:600; color:#374151;">
                🧾 Tổng cộng:
                <span style="color:#5aed72; font-size:1.3rem;"
                      th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
            </span>
            <a th:href="@{/order/checkout}" class="btn btn-primary" style="font-size:1rem; padding:11px 28px;">
                ✅ Đặt hàng ngay
            </a>
            <a th:href="@{/products}" class="btn btn-secondary">🔙 Tiếp tục mua sắm</a>
        </div>
    </div>

</section>

</html>
