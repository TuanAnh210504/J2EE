<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/_layout}">

<head>
    <title>Xác nhận đặt hàng</title>
</head>

<section layout:fragment="content">

    <h2>✅ Xác nhận đặt hàng</h2>

    <!-- Danh sách sản phẩm -->
    <table style="margin-bottom:20px;">
        <thead>
            <tr>
                <th>Tên sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.productName}"></td>
                <td><span class="price-badge" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span></td>
                <td th:text="${item.quantity}"></td>
                <td><span class="price-badge" style="background:#dcfce7;color:#16a34a;"
                          th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span></td>
            </tr>
        </tbody>
    </table>

    <div style="text-align:right; font-size:1.1rem; font-weight:600; margin-bottom:24px;">
        Tổng cộng:
        <span style="color:#5aed72; font-size:1.3rem;"
              th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
    </div>

    <!-- Form đặt hàng -->
    <form th:action="@{/order/checkout}" method="post" style="max-width:420px;">
        <div class="form-group">
            <label for="customerName">👤 Tên khách hàng</label>
            <input type="text" id="customerName" name="customerName" th:value="${username}"
                   placeholder="Nhập tên của bạn..." required />
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="font-size:1rem; padding:11px 28px;">🛍 Xác nhận đặt hàng</button>
            <a th:href="@{/cart}" class="btn btn-secondary">← Quay lại giỏ hàng</a>
        </div>
    </form>

</section>

</html>
