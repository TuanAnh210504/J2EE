<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/_layout}">

<head>
    <title>Đặt hàng thành công</title>
</head>

<section layout:fragment="content">

    <div style="text-align:center; padding:40px 0;">
        <div style="font-size:4rem; margin-bottom:16px;">🎉</div>
        <h2 style="font-size:1.8rem; color:#16a34a; justify-content:center;">Đặt hàng thành công!</h2>
        <p style="color:#6b7280; margin-top:8px; font-size:1rem;">
            Cảm ơn <strong th:text="${order.customerName}"></strong>! Đơn hàng của bạn đã được ghi nhận.
        </p>
    </div>

    <!-- Thông tin đơn hàng -->
    <div style="max-width:700px; margin:0 auto;">
        <div style="background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:10px; padding:20px; margin-bottom:24px;">
            <p><strong>🧾 Mã đơn hàng:</strong> #<span th:text="${order.id}"></span></p>
            <p><strong>👤 Khách hàng:</strong> <span th:text="${order.customerName}"></span></p>
            <p><strong>📅 Ngày đặt:</strong>
                <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
        </div>

        <!-- Chi tiết đơn hàng -->
        <h3 style="font-weight:700; margin-bottom:12px; color:#374151;">📋 Chi tiết đơn hàng</h3>
        <table>
            <thead>
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="detail : ${order.orderDetails}">
                    <td th:text="${detail.product.name}"></td>
                    <td><span class="price-badge"
                              th:text="${#numbers.formatDecimal(detail.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span></td>
                    <td th:text="${detail.quantity}"></td>
                    <td><span class="price-badge" style="background:#dcfce7;color:#16a34a;"
                              th:text="${#numbers.formatDecimal(detail.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span></td>
                </tr>
            </tbody>
        </table>

        <!-- Tổng tiền -->
        <div style="display:flex; justify-content:flex-end; margin-top:16px; padding-top:16px; border-top:2px solid #e5e7eb;">
            <span style="font-size:1.15rem; font-weight:700; color:#374151;">
                💵 Tổng thanh toán:
                <span style="color:#5aed72; font-size:1.4rem;"
                      th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
            </span>
        </div>

        <div style="text-align:center; margin-top:28px;">
            <a th:href="@{/products}" class="btn btn-primary" style="font-size:1rem; padding:11px 28px;">
                🛍 Tiếp tục mua sắm
            </a>
        </div>
    </div>

</section>

</html>
