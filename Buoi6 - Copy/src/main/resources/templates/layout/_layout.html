<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | Quản Lý Sản Phẩm">Quản Lý Sản Phẩm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1ae8e8;
            --primary-dark: #5aed72;
            --primary-light: #818cf8;
            --accent: #06b6d4;
            --bg: #f0f2f9;
            --surface: #ffffff;
            --text: #1e1b4b;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --danger: #ef4444;
            --success: #10b981;
            --shadow-sm: 0 1px 4px rgba(79, 70, 229, .10);
            --shadow-md: 0 4px 16px rgba(79, 70, 229, .13);
            --radius: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--accent) 100%);
            padding: 0 36px;
            box-shadow: 0 2px 12px rgba(79, 70, 229, .3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 62px;
        }

        .nav-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, .85);
            text-decoration: none;
            font-weight: 500;
            font-size: .92rem;
            padding: 7px 14px;
            border-radius: 6px;
            transition: background .2s, color .2s;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }

        .btn-logout {
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .35);
            color: #fff !important;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            font-weight: 500;
            padding: 6px 14px;
            text-decoration: none;
            transition: background .2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, .28) !important;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            padding: 36px 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .content-box {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--primary-dark);
            color: rgba(255, 255, 255, .55);
            text-align: center;
            padding: 18px 24px;
            font-size: .85rem;
        }

        footer span {
            color: var(--primary-light);
            font-weight: 500;
        }

        /* ===== SHARED UTILS ===== */
        .error {
            color: var(--danger);
            font-size: .82rem;
            margin-top: 4px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            border-radius: 7px;
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead tr {
            background: linear-gradient(90deg, var(--primary-dark), var(--primary));
            color: #fff;
        }

        table thead th {
            padding: 13px 16px;
            text-align: left;
            font-size: .88rem;
            font-weight: 600;
            letter-spacing: .3px;
        }

        table thead th:first-child {
            border-radius: 7px 0 0 7px;
        }

        table thead th:last-child {
            border-radius: 0 7px 7px 0;
        }

        table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        table tbody tr:last-child {
            border-bottom: none;
        }

        table tbody tr:hover {
            background: #f5f3ff;
        }

        table tbody td {
            padding: 14px 16px;
            font-size: .9rem;
            vertical-align: middle;
        }

        /* ===== PRODUCT IMAGE IN TABLE ===== */
        .product-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .img-placeholder {
            width: 72px;
            height: 72px;
            background: var(--bg);
            border-radius: 8px;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.5rem;
        }

        /* ===== PRICE BADGE ===== */
        .price-badge {
            background: #ede9fe;
            color: var(--primary-dark);
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
            font-size: .85rem;
            white-space: nowrap;
        }

        /* ===== CATEGORY BADGE ===== */
        .cat-badge {
            background: #cffafe;
            color: #0e7490;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: .82rem;
            font-weight: 500;
        }

        /* ===== ACTION LINKS ===== */
        .action-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: .88rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            max-width: 480px;
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            color: var(--text);
            background: var(--surface);
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
        }

        .img-preview {
            margin-top: 10px;
        }

        .img-preview img {
            max-width: 180px;
            max-height: 180px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 28px;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <a class="nav-brand" th:href="@{/home}">🛍 Quản Lý Sản Phẩm</a>
            <div class="nav-links">
                <a th:href="@{/products}">📦 Sản phẩm</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/create}">➕ Thêm sản phẩm</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/create}">📁 Thêm danh mục</a>
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <button type="submit" class="btn-logout">🔓 Đăng xuất</button>
                </form>
            </div>
        </nav>
    </header>

    <main>
        <div class="content-box" layout:fragment="content">
            <!-- Nội dung trang con -->
        </div>
    </main>

    <footer>
        © 2026 <span>Quản Lý Sản Phẩm</span> — Hệ thống quản lý sản phẩm nội bộ
    </footer>

</body>

</html>
